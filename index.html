<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portofoliu Case</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a18; min-height: 100vh; }
  .header { padding: 16px; border-bottom: 1px solid #e5e3da; background: #fff; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  .header-icon { width: 36px; height: 36px; background: #E6F1FB; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header span { font-size: 13px; color: #73726c; }
  .search-bar { padding: 10px 16px; background: #fff; border-bottom: 1px solid #e5e3da; }
  .search-bar input { width: 100%; padding: 9px 14px; border: 1px solid #d3d1c7; border-radius: 10px; font-size: 15px; background: #f5f5f0; color: #1a1a18; outline: none; }
  .search-bar input:focus { border-color: #378ADD; background: #fff; }
  .filters { padding: 10px 16px; display: flex; gap: 8px; background: #fff; border-bottom: 1px solid #e5e3da; overflow-x: auto; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #d3d1c7; font-size: 13px; cursor: pointer; white-space: nowrap; background: #fff; color: #5f5e5a; }
  .filter-btn.active { background: #E6F1FB; color: #0C447C; border-color: #85B7EB; font-weight: 500; }
  .count { font-size: 13px; color: #73726c; padding: 10px 16px 4px; }
  .list { padding: 8px 16px 24px; display: flex; flex-direction: column; gap: 10px; }
  .card { background: #fff; border: 1px solid #e5e3da; border-radius: 14px; padding: 14px; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; gap: 8px; }
  .card-name { font-size: 16px; font-weight: 600; line-height: 1.3; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .badge-new { background: #E6F1FB; color: #0C447C; }
  .badge-visited { background: #EAF3DE; color: #27500A; }
  .badge-contact { background: #FAEEDA; color: #633806; }
  .card-addr { font-size: 13px; color: #73726c; margin-bottom: 8px; line-height: 1.4; }
  .card-meta { display: flex; gap: 16px; font-size: 13px; color: #73726c; margin-bottom: 8px; flex-wrap: wrap; }
  .card-meta strong { color: #1a1a18; }
  .card-note { font-size: 13px; color: #5f5e5a; background: #f5f5f0; border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; line-height: 1.5; }
  .card-actions { display: flex; gap: 8px; margin-bottom: 8px; }
  .btn-nav { flex: 1; padding: 9px 8px; border-radius: 10px; border: 1px solid #d3d1c7; font-size: 14px; font-weight: 500; cursor: pointer; background: #f5f5f0; color: #1a1a18; text-decoration: none; text-align: center; display: block; }
  .btn-gm { background: #E6F1FB; color: #0C447C; border-color: #85B7EB; }
  .btn-waze { background: #EAF3DE; color: #1E5C0E; border-color: #97C459; }
  .btn-copy { background: #f5f5f0; color: #5f5e5a; border-color: #d3d1c7; font-size: 13px; }
  .coords { font-size: 11px; color: #b4b2a9; }
  .no-results { text-align: center; padding: 40px 20px; color: #73726c; }
</style>
</head>
<body>

<div class="header">

    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z" fill="#185FA5"/>

</div>

<div class="count" id="countLabel"></div>
<div class="list" id="cardList"></div>

   - note: observații personale
   - status: "new" | "visited" | "contact"
   - suprafata: ex. "120mp"
   - pret: ex. "95.000€" (opțional, lasă "" dacă nu vrei)
   - tel: telefon proprietar (opțional, lasă "" dacă nu vrei)

/* ================================================ */

let activeFilter = 'all';

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const visible = case_.filter(c => {
    return (c.nume || '').toLowerCase().includes(q) ||
           (c.note || '').toLowerCase().includes(q);
  });
  render(visible);
}

function statusLabel(s) {
  if (s === 'visited') return ['badge-visited', 'Vizitat'];
  if (s === 'contact') return ['badge-contact', 'De contactat'];
  return ['badge-new', 'Nevizitat'];
}

function copyCoords(lat, lng) {
  const text = lat + ', ' + lng;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert('Coordonate copiate: ' + text));
  } else {
    prompt('Copiază coordonatele:', text);
  }
}

function render(list) {
  const el = document.getElementById('cardList');
  const n = list.length;
  document.getElementById('subtitle').textContent = case_.length + ' locații';
  document.getElementById('countLabel').textContent = 'Se afișează ' + n + ' locați' + (n === 1 ? 'e' : 'i');

  if (n === 0) {
    el.innerHTML = '<div class="no-results">Nicio locație găsită.</div>';
    return;
  }

  el.innerHTML = list.map(c => {
    const [badgeClass, badgeText] = statusLabel(c.status || 'new');
    const gmUrl  = 'https://www.google.com/maps/dir/?api=1&destination=' + c.lat + ',' + c.lng;
    const wazeUrl = 'https://waze.com/ul?ll=' + c.lat + '%2C' + c.lng + '&navigate=yes';
    const telHtml = c.tel ? '<a href="tel:' + c.tel + '" class="btn-nav btn-copy" style="flex:none;padding:9px 12px;">📞 ' + c.tel + '</a>' : '';

    return '<div class="card">' +
      '<div class="card-top">' +
        '<span class="card-name">' + c.nume + '</span>' +
        '<span class="badge ' + badgeClass + '">' + badgeText + '</span>' +
      '</div>' +
      (c.adresa ? '<div class="card-addr">' + c.adresa + '</div>' : '') +
      (c.suprafata || c.pret ? '<div class="card-meta">' +
        (c.suprafata ? '<span>Suprafață: <strong>' + c.suprafata + '</strong></span>' : '') +
        (c.pret ? '<span>Preț: <strong>' + c.pret + '</strong></span>' : '') +
      '</div>' : '') +
      (c.note ? '<div class="card-note">' + c.note + '</div>' : '') +
      '<div class="card-actions">' +
        '<a class="btn-nav btn-gm" href="' + gmUrl + '">Google Maps</a>' +
        '<a class="btn-nav btn-waze" href="' + wazeUrl + '">Waze</a>' +
        '<button class="btn-nav btn-copy" onclick="copyCoords(' + c.lat + ',' + c.lng + ')">Copiază GPS</button>' +
      '</div>' +
      (c.tel ? '<div class="card-actions">' + telHtml + '</div>' : '') +
      '<div class="coords">' + c.lat + ', ' + c.lng + '</div>' +
    '</div>';
  }).join('');
}

filterCards();
</script>
</body>
</html>
